<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Đợt Ủng Hộ - Người Nhận</title>
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/recipient_campaigns.css">
</head>

<body style="background-color: var(--bg-color);">

    <!-- Top Navbar -->
    <header class="admin-topbar"
        style="position: fixed; top: 0; left: 0; right: 0; z-index: 20; background-color: var(--primary-color);">
        <div class="donor-brand"
            style="display: flex; align-items: center; gap: 0.75rem; color: white; font-weight: 700; font-size: 1.25rem;">
            <i class="fa-solid fa-hands-holding-child" style="color: var(--accent-orange);"></i>
            <span>CỨU TRỢ <span style="color: var(--accent-cyan);">HÒA VANG</span></span>
        </div>

        <div class="donor-top-links" style="display: flex; align-items: center; gap: 1.5rem;">
            <a href="home.html" class="nav-link" style="color: white; text-decoration: none;"><i
                    class="fa-solid fa-house"></i> Trang Chủ</a>
            <div class="user-badge" style="display: flex; align-items: center; gap: 0.75rem; color: white;">
                <i class="fa-solid fa-circle-user" style="font-size: 1.5rem; color: var(--accent-orange);"></i>
                <span id="display-user-name">Nguyễn Văn B</span>
                <span
                    style="font-size: 0.8rem; color: var(--accent-cyan); border-left: 1px solid rgba(255,255,255,0.3); padding-left: 0.75rem;">Người
                    Nhận</span>
                <a href="login.html" class="logout-btn" title="Đăng xuất" style="color: white; margin-left: 0.5rem;"><i
                        class="fa-solid fa-right-from-bracket"></i></a>
            </div>
        </div>
    </header>

    <div class="admin-layout" style="padding-top: 70px; display: flex; min-height: 100vh;">
        <!-- Sidebar Menu -->
        <aside class="admin-sidebar" id="sidebar"
            style="top: 70px; width: 260px; background-color: white; border-right: 1px solid var(--border-color); position: fixed; bottom: 0; overflow-y: auto;">
            <div class="sidebar-header"
                style="background: var(--bg-card); padding: 1.5rem 1rem; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 1rem;">
                <div class="admin-avatar"
                    style="width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: rgba(14, 165, 233, 0.1); color: var(--accent-cyan);">
                    <i class="fa-solid fa-house-chimney-crack"></i>
                </div>
                <div class="admin-info">
                    <h3 style="color: var(--text-dark); font-size: 1.1rem; margin: 0;">Menu Cứu Trợ</h3>
                    <p style="color: var(--accent-orange); font-weight: 600; font-size: 0.85rem; margin: 0;">Hỗ trợ
                        người dân</p>
                </div>
            </div>
            <nav class="sidebar-menu" id="recipient-menu" style="padding: 1rem 0;">
                <a href="recipient_campaigns.html" class="menu-item active"><i
                        class="fa-solid fa-layer-group"></i><span>Đợt Cứu Trợ</span></a>
                <a href="recipient_schedule.html" class="menu-item "><i class="fa-solid fa-calendar-days"></i><span>Lịch
                        Nhận Hỗ Trợ</span></a>
                <a href="recipient_request.html" class="menu-item "><i
                        class="fa-solid fa-hand-holding-medical"></i><span>Yêu Cầu Cứu Trợ</span></a>
                <a href="recipient_thanks.html" class="menu-item "><i
                        class="fa-solid fa-envelope-open-text"></i><span>Gửi Thư Cảm Ơn</span></a>
                <a href="recipient_profile.html" class="menu-item "><i class="fa-solid fa-user-pen"></i><span>Thông Tin
                        Cá Nhân</span></a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main" style="flex: 1; margin-left: 260px; padding: 2rem;">
            <div class="content-body">
                <div class="page-title" style="margin-bottom: 2rem;">
                    <h2 style="font-size: 1.75rem; color: var(--text-dark); margin-bottom: 0.5rem;">Danh Sách Đợt Cứu
                        Trợ</h2>
                    <p class="page-subtitle" style="color: var(--text-muted);">Xem thông tin về các đợt ủng hộ và các
                        gói cứu trợ hiện tại.</p>
                </div>

                <div class="campaigns-grid" id="campaigns-container">
                    <!-- Data will be loaded via JS -->
                    <div style="text-align: center; padding: 3rem; color: var(--text-muted); width: 100%;">
                        <i class="fa-solid fa-spinner fa-spin"
                            style="font-size: 2rem; margin-bottom: 1rem; color: var(--accent-cyan);"></i>
                        <p>Đang tải danh sách đợt cứu trợ...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/recipient_campaigns.js"></script>
</body>

</html>
