<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Người Ủng Hộ - Quản Lý Cứu Trợ Lũ Lụt</title>
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/donor.css">
</head>
<body style="background-color: var(--bg-color);">

    <!-- Top Navbar -->
    <header class="admin-topbar donor-topbar" style="position: fixed; top: 0; left: 0; right: 0; z-index: 20;">
        <div class="donor-brand">
            <i class="fa-solid fa-hands-holding-child" style="color: var(--accent-orange);"></i>
            <span>CỨU TRỢ <span style="color: var(--accent-cyan);">HÒA VANG</span></span>
        </div>
        
        <div class="donor-top-links">
            <a href="home.html" class="nav-link"><i class="fa-solid fa-house"></i> Trang Chủ</a>
            <div class="user-badge">
                <i class="fa-solid fa-circle-user" style="font-size: 1.5rem; color: var(--accent-orange);"></i>
                <span id="display-user-name">Nguyễn Văn A</span>
                <span style="font-size: 0.8rem; color: var(--accent-cyan); border-left: 1px solid rgba(255,255,255,0.3); padding-left: 0.75rem;">Nhà Hảo Tâm</span>
                <a href="login.html" class="logout-btn" title="Đăng xuất"><i class="fa-solid fa-right-from-bracket"></i></a>
            </div>
        </div>
    </header>

    <div class="admin-layout" style="padding-top: 70px;">
        <!-- Sidebar Menu -->
        <aside class="admin-sidebar" id="sidebar" style="top: 70px;">
        <div class="sidebar-header" style="background: var(--bg-card); padding: 1.5rem 1rem;">
            <div class="admin-avatar" style="background: rgba(245, 158, 11, 0.1); color: var(--accent-orange);"><i class="fa-solid fa-hand-holding-heart"></i></div>
            <div class="admin-info">
                <h3 style="color: var(--text-dark);">Menu Ủng Hộ</h3>
                <p style="color: var(--accent-cyan); font-weight: 600;">Cổng thông tin</p>
            </div>
        </div>
        <nav class="sidebar-menu" id="donor-menu">
            <a href="donor_register.html" class="menu-item "><i class="fa-solid fa-box-open"></i><span>Đăng Ký Ủng Hộ</span></a>
            <a href="donor_campaigns.html" class="menu-item "><i class="fa-solid fa-layer-group"></i><span>Đợt Ủng Hộ</span></a>
            <a href="donor_history.html" class="menu-item "><i class="fa-solid fa-clock-rotate-left"></i><span>Lịch Sử Đóng Góp</span></a>
            <a href="donor_notifications.html" class="menu-item "><i class="fa-solid fa-bell"></i><span>Thông Báo</span></a>
            <a href="donor_guide.html" class="menu-item "><i class="fa-solid fa-circle-info"></i><span>Cách Thức Ủng Hộ</span></a>
            <a href="donor_profile.html" class="menu-item active"><i class="fa-solid fa-user-pen"></i><span>Hồ Sơ Cá Nhân</span></a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <div class="content-body" style="padding: 2rem;">
            <section id="tab-profile" class="tab-content active">
                <div class="page-title">
                    <h2>Thông Tin Cá Nhân</h2>
                    <p class="page-subtitle">Quản lý và cập nhật hồ sơ của bạn.</p>
                </div>
                <div class="donor-card" style="max-width: 800px;">
                    <div class="donor-card-header">
                        <h3 class="donor-card-title">Cập nhật hồ sơ</h3>
                    </div>
                    <form id="profile-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Họ và Tên</label>
                                <input type="text" class="form-input" id="profile-name" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Số điện thoại</label>
                                <input type="tel" class="form-input" id="profile-phone" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-input" id="profile-email">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Địa chỉ liên hệ</label>
                                <input type="text" class="form-input" id="profile-address">
                            </div>
                        </div>

                        <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
                            <h4 style="margin-bottom: 1rem; color: var(--text-dark);">Đổi mật khẩu (Bỏ trống nếu không đổi)</h4>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label class="form-label">Mật khẩu mới</label>
                                    <input type="password" class="form-input" id="profile-new-pass" placeholder="Nhập mật khẩu mới">
                                </div>
                            </div>
                        </div>

                        <div style="margin-top: 2rem;">
                            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Lưu Thay Đổi</button>
                            <span id="profile-msg" style="margin-left: 1rem; font-weight: 500;"></span>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </main>
    </div>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/donor.js"></script>
</body>
</html>
