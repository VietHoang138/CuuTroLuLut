<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đợt Cứu Trợ - Người Vận Chuyển</title>
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/transporter_campaigns.css">
</head>
<body style="background-color: var(--bg-color);">

    <!-- Top Navbar -->
    <header class="admin-topbar" style="position: fixed; top: 0; left: 0; right: 0; z-index: 20; background-color: var(--primary-color);">
        <div class="donor-brand" style="display: flex; align-items: center; gap: 0.75rem; color: white; font-weight: 700; font-size: 1.25rem;">
            <i class="fa-solid fa-truck-fast" style="color: var(--accent-orange);"></i>
            <span>VẬN CHUYỂN <span style="color: var(--accent-cyan);">HÒA VANG</span></span>
        </div>
        
        <div class="donor-top-links" style="display: flex; align-items: center; gap: 1.5rem;">
            <a href="home.html" class="nav-link" style="color: white; text-decoration: none;"><i class="fa-solid fa-house"></i> Trang Chủ</a>
            <div class="user-badge" style="display: flex; align-items: center; gap: 0.75rem; color: white;">
                <i class="fa-solid fa-circle-user" style="font-size: 1.5rem; color: var(--accent-orange);"></i>
                <span id="display-user-name">Tài xế Hoàng</span>
                <span style="font-size: 0.8rem; color: var(--accent-cyan); border-left: 1px solid rgba(255,255,255,0.3); padding-left: 0.75rem;">Người Vận Chuyển</span>
                <a href="login.html" class="logout-btn" title="Đăng xuất" style="color: white; margin-left: 0.5rem;"><i class="fa-solid fa-right-from-bracket"></i></a>
            </div>
        </div>
    </header>

    <div class="admin-layout" style="padding-top: 70px; display: flex; min-height: 100vh;">
        <!-- Sidebar Menu -->
        <aside class="admin-sidebar" id="sidebar" style="top: 70px; width: 260px; background-color: white; border-right: 1px solid var(--border-color); position: fixed; bottom: 0; overflow-y: auto;">
            <div class="sidebar-header" style="background: var(--bg-card); padding: 1.5rem 1rem; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 1rem;">
                <div class="admin-avatar" style="width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: rgba(14, 165, 233, 0.1); color: var(--accent-cyan);">
                    <i class="fa-solid fa-truck-ramp-box"></i>
                </div>
                <div class="admin-info">
                    <h3 style="color: var(--text-dark); font-size: 1.1rem; margin: 0;">Điều Phối</h3>
                    <p style="color: var(--accent-orange); font-weight: 600; font-size: 0.85rem; margin: 0;">Vận chuyển hàng</p>
                </div>
            </div>
            <nav class="sidebar-menu" id="transporter-menu" style="padding: 1rem 0;">
                <a href="transporter_campaigns.html" class="menu-item active"><i class="fa-solid fa-layer-group"></i><span>Đợt Cứu Trợ</span></a>
                <a href="transporter_shipments.html" class="menu-item "><i class="fa-solid fa-boxes-packing"></i><span>Chuyến Hàng Chờ</span></a>
                <a href="transporter_schedule.html" class="menu-item "><i class="fa-solid fa-route"></i><span>Lịch Trình & Trạng Thái</span></a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main" style="flex: 1; margin-left: 260px; padding: 2.5rem; background: #f8fafc;">
            <div class="content-body" style="max-width: 1200px; margin: 0 auto;">
                
                <!-- Hero Section for Campaigns -->
                <div class="campaign-hero">
                    <div class="hero-content">
                        <h2>Danh Sách Đợt Cứu Trợ</h2>
                        <p>Theo dõi các chiến dịch hỗ trợ khẩn cấp. Nắm bắt khu vực nào đang cần hỗ trợ vận chuyển nhiều nhất.</p>
                    </div>
                    <div class="hero-illustration">
                        <i class="fa-solid fa-handshake-angle"></i>
                    </div>
                </div>

                <!-- Filters -->
                <div class="campaign-filters">
                    <div class="filter-group">
                        <button class="filter-btn active" data-filter="all">Tất cả</button>
                        <button class="filter-btn" data-filter="active">Đang diễn ra</button>
                        <button class="filter-btn" data-filter="upcoming">Sắp tới</button>
                    </div>
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="campaign-search" placeholder="Tìm kiếm đợt cứu trợ...">
                    </div>
                </div>

                <!-- Campaigns Grid -->
                <div class="campaigns-grid" id="campaigns-list">
                    <!-- Cards will be populated by JS -->
                    <div class="loading-state">
                        <i class="fa-solid fa-circle-notch fa-spin"></i>
                        <p>Đang tải dữ liệu...</p>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/transporter_campaigns.js"></script>
</body>
</html>
